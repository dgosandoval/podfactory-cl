<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pod Factory by Doppel — Premium Podcast Studio</title>
<link rel="icon" type="image/png" href="assets/favicon.png?v=1">
<link rel="apple-touch-icon" href="assets/favicon.png?v=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #F5EBD6; font-family: 'Archivo', sans-serif; }
  * { box-sizing: border-box; }
  img, video { max-width: 100%; height: auto; }
  /* Responsive — mobile */
  @media (max-width: 720px) {
    html, body { overflow-x: hidden; }
    /* Top brand bar: stack vertically */
    .pf-brandbar { flex-direction: column !important; gap: 6px !important; padding: 10px 16px !important; align-items: flex-start !important; }
    .pf-brandbar > div, .pf-brandbar > span { font-size: 10px !important; }
    /* Header */
    .pf-header { padding: 14px 16px !important; flex-wrap: wrap !important; gap: 12px !important; }
    .pf-header nav { display: none !important; }
    .pf-header .pf-brand { gap: 10px !important; }
    .pf-header .pf-brand img.pf-logo-img { height: 36px !important; }
    /* Sections: tighter side padding */
    .pf-hero { padding: 24px 18px 24px !important; grid-template-columns: 1fr !important; gap: 24px !important; }
    .pf-hero h1 { font-size: clamp(40px, 11vw, 64px) !important; line-height: 0.95 !important; }
    .pf-hero p { font-size: 15px !important; }
    .pf-hero .pf-reel { width: 100% !important; max-width: 280px !important; justify-self: center !important; }
    .pf-hero-cta { gap: 10px !important; }
    .pf-hero-cta a { padding: 12px 18px !important; font-size: 12px !important; }
    /* Stats strip: 2 cols on mobile */
    .pf-stats { grid-template-columns: repeat(2, 1fr) !important; }
    .pf-stats > div { padding: 18px 14px !important; border-bottom: 1.5px solid #0A0A0A !important; }
    .pf-stats > div:nth-child(2) { border-right: none !important; }
    .pf-stats > div:nth-child(odd) { border-right: 1.5px solid #0A0A0A !important; }
    .pf-stats > div:nth-child(n+3) { border-bottom: none !important; }
    .pf-stats > div > div:first-child { font-size: 38px !important; }
    /* Services / Productions / Tech specs / Pricing / Location grids → 1 col */
    .pf-services, .pf-productions, .pf-techspecs, .pf-pricing-grid, .pf-location-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
    .pf-location-grid > div:last-child { min-height: 280px !important; }
    /* Generic section padding reduction */
    section { padding-left: 18px !important; padding-right: 18px !important; }
    /* h2 sizing */
    section h2 { font-size: clamp(30px, 8vw, 42px) !important; }
    /* Booking calendar — horizontal scroll wrapper */
    .pf-calendar-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .pf-calendar-wrap > div { min-width: 640px; }
    /* Footer: stack */
    footer .pf-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 20px !important; }
    footer .pf-footer-grid > div:first-child { grid-column: 1 / -1; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx?v=20"></script>
<script type="text/babel" src="pod-factory-landing.jsx?v=20"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<PodFactoryLanding />);
</script>
</body>
</html>
