<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Admin · Pod Factory Reservas</title>
<link rel="icon" type="image/png" href="assets/favicon.png?v=1">
<style>
  :root { --bg:#f8f9fa; --paper:#fff; --ink:#212529; --muted:#6c757d; --line:#dee2e6; --blue:#0d6efd; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-size:16px; line-height:1.5;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; }
  * { box-sizing:border-box; }
  input, textarea, select, button { font-family:inherit; }
  input:focus, textarea:focus, select:focus { outline:0; border-color:#86b7fe; box-shadow:0 0 0 .25rem rgba(13,110,253,.25); }
  button { cursor:pointer; }
  button:disabled { cursor:not-allowed; opacity:.65; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const M = { bg:'#f8f9fa', paper:'#fff', ink:'#212529', muted:'#6c757d', line:'#dee2e6',
  blue:'#0d6efd', red:'#dc3545', green:'#198754' };
const CLP = (n) => '$' + Number(n||0).toLocaleString('es-CL');
const KEYNAME = 'pf_admin_key';

// ── Estilos compartidos (look Bootstrap, igual que el portal de proyectos) ──
const CARD = { background:M.paper, border:`1px solid ${M.line}`, borderRadius:8, padding:'18px 20px', marginBottom:16, boxShadow:'0 .125rem .25rem rgba(0,0,0,.05)' };
const BTN = { padding:'8px 16px', border:`1px solid ${M.blue}`, background:M.blue, color:'#fff', borderRadius:6, fontWeight:500, fontSize:14, lineHeight:1.5 };
const BTN_GHOST = { padding:'8px 14px', border:'1px solid #ced4da', background:'#fff', color:M.muted, borderRadius:6, fontSize:13, fontWeight:500 };
const INP = { padding:'8px 12px', border:'1px solid #ced4da', borderRadius:6, fontSize:14, width:'100%', color:M.ink, background:'#fff' };
const LEGEND = { fontSize:11, color:M.muted, textTransform:'uppercase', letterSpacing:'0.08em', fontWeight:600 };
const TAG = { fontSize:13, color:M.muted };
// Botón de día/slot tipo "chip": seleccionado = azul, disponible = blanco, no disponible = atenuado.
const chip = (on, available=true) => ({
  border:`1px solid ${on ? M.blue : (available ? M.line : '#e3e6ea')}`,
  background:on ? M.blue : (available ? '#fff' : '#f1f3f5'),
  color:on ? '#fff' : (available ? M.ink : '#adb5bd'),
  borderRadius:6, fontSize:13, fontWeight:600,
});

function upcomingDays(count) {
  const out = []; const d = new Date(); d.setHours(0,0,0,0);
  while (out.length < count) {
    if ([1,2,3,4,5,6].includes(d.getDay())) out.push({
      iso:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
      dow:d.toLocaleDateString('es-CL',{weekday:'short'}).replace('.',''), dn:d.getDate(),
      mon:d.toLocaleDateString('es-CL',{month:'short'}).replace('.','') });
    d.setDate(d.getDate()+1);
  }
  return out;
}

const Header = () => (
  <div style={{ background:'#fff', borderBottom:`1px solid ${M.line}`, boxShadow:'0 .125rem .25rem rgba(0,0,0,.04)',
    padding:'12px 18px', marginBottom:24, borderRadius:8, display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap' }}>
    <span style={{ background:'#000', borderRadius:7, padding:'6px 9px', display:'inline-flex', alignItems:'center' }}>
      <img src="/assets/podfactory-logo.png" alt="Pod Factory" style={{ height:18, display:'block' }} />
    </span>
    <a href="https://podfactory.cl" target="_blank" rel="noopener" style={{ color:M.blue, fontSize:13, fontWeight:600, textDecoration:'none' }}>Ir a Pod Factory ↗</a>
  </div>
);

function Admin() {
  const [key, setKey] = React.useState(() => localStorage.getItem(KEYNAME) || '');
  const [authed, setAuthed] = React.useState(false);
  const [input, setInput] = React.useState('');
  const [bookings, setBookings] = React.useState(null);
  const [err, setErr] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [prefill] = React.useState(() => {
    const p = new URLSearchParams(location.search);
    return p.get('nb') ? { name: p.get('name')||'', email: p.get('email')||'', phone: p.get('phone')||'', portalProjectId: p.get('project')||'' } : null;
  });
  const [showNew, setShowNew] = React.useState(() => !!new URLSearchParams(location.search).get('nb'));
  React.useEffect(() => { if (new URLSearchParams(location.search).get('nb')) history.replaceState(null,'','/admin'); }, []);

  const headers = () => ({ 'x-admin-key': key, 'content-type':'application/json' });

  async function load(k = key) {
    setErr(null);
    const r = await fetch('/api/admin/bookings', { headers: { 'x-admin-key': k } });
    if (r.status === 403) { setAuthed(false); setErr('Clave incorrecta.'); localStorage.removeItem(KEYNAME); return false; }
    const o = await r.json();
    setBookings(o.bookings || []); setAuthed(true); return true;
  }
  React.useEffect(() => { if (key) load(); }, []);

  async function entrar() {
    setKey(input);
    const ok = await load(input);
    if (ok) localStorage.setItem(KEYNAME, input);
  }
  async function cancelar(b) {
    if (!confirm(`¿Cancelar la reserva de ${b.name} (${b.fecha} ${b.hora})?`)) return;
    setBusy(true);
    const r = await fetch('/api/cancel', { method:'POST', headers: headers(), body: JSON.stringify({ id: b.token }) });
    setBusy(false);
    if (!r.ok) { const o = await r.json(); alert('Error: ' + (o.error||'')); return; }
    load();
  }

  const wrap = { maxWidth:760, margin:'0 auto', padding:'24px 18px' };

  if (!authed) return (
    <div style={wrap}>
      <Header />
      <div style={CARD}>
        <h1 style={{ fontSize:28, fontWeight:600, letterSpacing:'-0.01em', margin:'0 0 4px' }}>Admin</h1>
        <p style={{ ...TAG, margin:'0 0 14px' }}>Ingresa la clave de administración:</p>
        <div style={{ display:'flex', gap:8, maxWidth:420 }}>
          <input type="password" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&entrar()}
            placeholder="ADMIN_KEY" style={{ ...INP, flex:1 }} />
          <button onClick={entrar} style={{ ...BTN, whiteSpace:'nowrap' }}>Entrar</button>
        </div>
        {err && <p style={{ color:M.red, fontSize:13, marginBottom:0 }}>{err}</p>}
      </div>
    </div>
  );

  return (
    <div style={wrap}>
      <Header />
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10, marginBottom:18 }}>
        <h1 style={{ fontSize:30, fontWeight:600, letterSpacing:'-0.01em', margin:0 }}>Reservas</h1>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={()=>setShowNew(v=>!v)} style={BTN}>{showNew?'✕ Cerrar':'+ Nueva reserva'}</button>
          <button onClick={()=>load()} style={BTN_GHOST}>↻ Actualizar</button>
        </div>
      </div>
      {showNew && <NewBookingForm headers={headers} prefill={prefill} onDone={()=>{setShowNew(false);load();}} />}
      {!bookings && <p style={TAG}>Cargando…</p>}
      {bookings && bookings.length === 0 && <p style={TAG}>Aún no hay reservas.</p>}
      {bookings && bookings.map(b => (
        <BookingCard key={b.token} b={b} busy={busy} onCancel={()=>cancelar(b)} headers={headers} reload={load} />
      ))}
    </div>
  );
}

function NewBookingForm({ headers, onDone, prefill }) {
  const [days] = React.useState(() => upcomingDays(18));
  const [date, setDate] = React.useState(days[0].iso);
  const [avail, setAvail] = React.useState(null);
  const [slot, setSlot] = React.useState(null);
  const [f, setF] = React.useState({ name: prefill?.name||'', email: prefill?.email||'', phone: prefill?.phone||'', tipo:'Podcast', personas:1, addons:[], comentarios:'', deposit:'', sendEmail:true });
  const [working, setWorking] = React.useState(false);
  const [err, setErr] = React.useState(null);
  const [custom, setCustom] = React.useState(false);
  const [cstart, setCstart] = React.useState('12:00');
  const [cmins, setCmins] = React.useState(80);
  const ADDONS = ['Edición Pro','3 Reels adicionales'];

  React.useEffect(() => { setAvail(null); setSlot(null);
    fetch(`/api/availability?date=${date}`).then(r=>r.json()).then(setAvail).catch(()=>setAvail({open:false,slots:[]}));
  }, [date]);

  const toggleAddon = (a) => setF(s=>({...s, addons: s.addons.includes(a)?s.addons.filter(x=>x!==a):[...s.addons,a]}));

  async function crear() {
    setWorking(true); setErr(null);
    try {
      const r = await fetch('/api/admin/create-booking', { method:'POST', headers: headers(),
        body: JSON.stringify({ date, ...(custom ? {customStart: cstart, customMinutes: cmins} : {label: slot?.label}), name:f.name, email:f.email, phone:f.phone, tipo:f.tipo, personas:f.personas, addons:f.addons, comentarios:f.comentarios, deposit: Math.max(0, parseInt(f.deposit,10)||0), sendEmail:f.sendEmail, portalProjectId: prefill?.portalProjectId || undefined }) });
      const o = await r.json();
      if (!r.ok) throw new Error(o.error||'Error');
      onDone();
    } catch(e) { setErr(String(e.message||e)); setWorking(false); }
  }

  return (
    <div style={CARD}>
      <div style={{ fontWeight:600, fontSize:17, marginBottom:12 }}>Nueva reserva manual</div>
      {prefill?.portalProjectId && (
        <div style={{ background:'#cfe2ff', color:'#084298', border:'1px solid #b6d4fe', borderRadius:6, padding:'8px 12px', fontSize:13, marginBottom:12 }}>
          Se asociará al proyecto del portal #{prefill.portalProjectId} · cliente {prefill.name || prefill.email}
        </div>
      )}
      <div style={{ ...LEGEND, marginBottom:6 }}>1. Elige día y bloque</div>
      <div style={{ display:'flex', gap:6, overflowX:'auto', paddingBottom:8 }}>
        {days.map(d=>{const on=d.iso===date;return(
          <button key={d.iso} onClick={()=>setDate(d.iso)} style={{ ...chip(on), flex:'0 0 auto', minWidth:52, padding:'6px', textAlign:'center' }}>
            <div style={{ fontSize:10, opacity:.7, textTransform:'uppercase' }}>{d.dow}</div><div style={{ fontSize:16, fontWeight:700 }}>{d.dn}</div>
          </button>);})}
      </div>
      {!avail && <span style={{ ...TAG, fontSize:12 }}>Cargando…</span>}
      {avail && !avail.open && <span style={{ ...TAG, fontSize:12 }}>Día cerrado.</span>}
      {!custom && avail && avail.open && (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(82px,1fr))', gap:6, marginBottom:8 }}>
          {avail.slots.map(s=>{const on=slot?.label===s.label;return(
            <button key={s.start} disabled={!s.available} onClick={()=>setSlot(s)}
              style={{ ...chip(on, s.available), padding:'10px 4px', textDecoration:s.available?'none':'line-through' }}>{s.label}</button>);})}
        </div>
      )}
      <div style={{ margin:'2px 0 8px' }}>
        <label style={{ fontSize:13, color:M.muted, display:'inline-flex', gap:6, alignItems:'center', cursor:'pointer' }}>
          <input type="checkbox" checked={custom} onChange={e=>{setCustom(e.target.checked); setSlot(null);}} /> Horario personalizado (entre medio)
        </label>
        {custom && (
          <div style={{ display:'flex', gap:8, marginTop:6, alignItems:'center', flexWrap:'wrap' }}>
            <input type="time" value={cstart} onChange={e=>setCstart(e.target.value)} style={{ ...INP, width:130 }} />
            <span style={{ ...TAG, fontSize:12 }}>dura</span>
            <input type="number" min="20" step="5" value={cmins} onChange={e=>setCmins(parseInt(e.target.value,10)||80)} style={{ ...INP, width:90 }} />
            <span style={{ ...TAG, fontSize:12 }}>min</span>
          </div>
        )}
      </div>
      {(slot || custom) && (
        <div style={{ marginTop:10 }}>
          <div style={{ ...LEGEND, margin:'8px 0 6px' }}>2. Datos del cliente</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8 }}>
            <input style={{ ...INP, gridColumn:'1/-1' }} placeholder="Nombre y apellido" value={f.name} onChange={e=>setF({...f,name:e.target.value})} />
            <input style={INP} type="email" placeholder="Email" value={f.email} onChange={e=>setF({...f,email:e.target.value})} />
            <input style={INP} placeholder="Teléfono" value={f.phone} onChange={e=>setF({...f,phone:e.target.value})} />
          </div>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:8, alignItems:'center' }}>
            {['Podcast','Webinar / Streaming'].map(t=>(
              <button key={t} onClick={()=>setF({...f,tipo:t})} style={{ ...chip(f.tipo===t), padding:'8px 12px' }}>{t}</button>
            ))}
            <span style={{ ...TAG, fontSize:12 }}>Personas:</span>
            {[1,2,3,4].map(n=>(
              <button key={n} onClick={()=>setF({...f,personas:n})} style={{ ...chip(f.personas===n), width:34, height:34, fontWeight:700 }}>{n}</button>
            ))}
          </div>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:8 }}>
            {ADDONS.map(a=>(
              <button key={a} onClick={()=>toggleAddon(a)} style={{ ...chip(f.addons.includes(a)), padding:'8px 12px', fontWeight:500 }}>{f.addons.includes(a)?'☑':'☐'} {a}</button>
            ))}
          </div>
          <textarea style={{ ...INP, marginBottom:8, resize:'vertical' }} rows={2} placeholder="Comentarios (opcional)" value={f.comentarios} onChange={e=>setF({...f,comentarios:e.target.value})} />
          <div style={{ display:'flex', gap:12, flexWrap:'wrap', alignItems:'center', marginBottom:12 }}>
            <input style={{ ...INP, width:200 }} type="number" min="0" placeholder="Adelanto $ (opcional)" value={f.deposit} onChange={e=>setF({...f,deposit:e.target.value})} />
            <label style={{ fontSize:13, color:M.muted, display:'flex', gap:6, alignItems:'center', cursor:'pointer' }}>
              <input type="checkbox" checked={f.sendEmail} onChange={e=>setF({...f,sendEmail:e.target.checked})} /> Enviar correo de confirmación al cliente
            </label>
          </div>
          <button onClick={crear} disabled={working || !f.name} style={{ ...BTN, background:M.green, borderColor:M.green, padding:'10px 20px', fontSize:14 }}>
            {working?'Creando…':'Crear reserva'}
          </button>
          {err && <span style={{ color:M.red, fontSize:13, marginLeft:10 }}>{err}</span>}
        </div>
      )}
    </div>
  );
}

function BookingCard({ b, busy, onCancel, headers, reload }) {
  const [resched, setResched] = React.useState(false);
  const [days] = React.useState(() => upcomingDays(18));
  const [date, setDate] = React.useState(days[0].iso);
  const [avail, setAvail] = React.useState(null);
  const [working, setWorking] = React.useState(false);

  React.useEffect(() => {
    if (!resched) return; setAvail(null);
    fetch(`/api/availability?date=${date}`).then(r=>r.json()).then(setAvail).catch(()=>setAvail({open:false,slots:[]}));
  }, [resched, date]);

  async function mover(slot) {
    setWorking(true);
    const r = await fetch('/api/reschedule', { method:'POST', headers: headers(),
      body: JSON.stringify({ id: b.token, date, start: slot.start, label: slot.label }) });
    setWorking(false);
    if (!r.ok) { const o = await r.json(); alert('Error: ' + (o.error||'')); return; }
    setResched(false); reload();
  }

  return (
    <div style={{ ...CARD, opacity: b.past?0.6:1 }}>
      <div style={{ display:'flex', justifyContent:'space-between', gap:12, flexWrap:'wrap' }}>
        <div>
          <div style={{ fontWeight:600, fontSize:17, textTransform:'capitalize' }}>{b.fecha} · {b.hora} hrs {b.past && <span style={{ ...TAG, fontWeight:400 }}>(pasada)</span>}</div>
          <div style={{ fontWeight:600, fontSize:15, marginTop:2 }}>{b.name}</div>
          <div style={TAG}>{b.email} · {b.phone}</div>
          <div style={{ ...TAG, marginTop:6, color:M.ink }}>
            {b.tipo} · {b.personas} {b.personas>1?'personas':'persona'}{b.addons&&b.addons.length?` · ${b.addons.join(', ')}`:''}
          </div>
          {b.comentarios && <div style={{ ...TAG, marginTop:4, fontStyle:'italic' }}>“{b.comentarios}”</div>}
        </div>
        <div style={{ ...TAG, textAlign:'right', whiteSpace:'nowrap' }}>Adelanto<br/><b style={{ color:M.green, fontSize:15 }}>{CLP(b.deposit)}</b></div>
      </div>
      {!b.past && (
        <div style={{ display:'flex', gap:8, marginTop:12 }}>
          <button onClick={()=>setResched(!resched)} style={resched ? { ...BTN } : { ...BTN_GHOST, color:M.ink }}>Reagendar</button>
          <button onClick={onCancel} disabled={busy} style={{ ...BTN_GHOST, color:M.red, borderColor:'#f1aeb5' }}>Cancelar</button>
        </div>
      )}
      {resched && (
        <div style={{ marginTop:12, borderTop:`1px solid ${M.line}`, paddingTop:12 }}>
          <div style={{ display:'flex', gap:6, overflowX:'auto', paddingBottom:8 }}>
            {days.map(d=>{const on=d.iso===date;return(
              <button key={d.iso} onClick={()=>setDate(d.iso)} style={{ ...chip(on), flex:'0 0 auto', minWidth:52, padding:'6px', textAlign:'center' }}>
                <div style={{ fontSize:10, opacity:.7, textTransform:'uppercase' }}>{d.dow}</div><div style={{ fontSize:16, fontWeight:700 }}>{d.dn}</div>
              </button>);})}
          </div>
          {!avail && <span style={{ ...TAG, fontSize:12 }}>Cargando…</span>}
          {avail && avail.open && (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(80px,1fr))', gap:6 }}>
              {avail.slots.map(s=>(
                <button key={s.start} disabled={!s.available||working} onClick={()=>mover(s)}
                  style={{ ...chip(false, s.available), padding:'10px 4px', textDecoration:s.available?'none':'line-through' }}>{s.label}</button>
              ))}
            </div>
          )}
          {avail && !avail.open && <span style={{ ...TAG, fontSize:12 }}>Día cerrado.</span>}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Admin />);
</script>
</body>
</html>
